<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>sky10</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <script>
      (() => {
        const storageKey = "sky10:theme";
        const root = document.documentElement;
        let preference = "system";

        try {
          const stored = window.localStorage.getItem(storageKey);
          if (stored === "light" || stored === "dark" || stored === "system") {
            preference = stored;
          }
        } catch {
          // Ignore localStorage access failures and fall back to system.
        }

        const systemDark =
          window.matchMedia &&
          window.matchMedia("(prefers-color-scheme: dark)").matches;
        const resolved = preference === "system"
          ? (systemDark ? "dark" : "light")
          : preference;

        root.classList.toggle("dark", resolved === "dark");
        root.dataset.themePreference = preference;
        root.dataset.theme = resolved;
        root.style.colorScheme = resolved;
      })();
    </script>
  </head>
  <body class="bg-surface font-body text-on-surface antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
