<svg xmlns="http://www.w3.org/2000/svg" width="44" height="44" viewBox="0 0 44 44">
  <!-- Syncing frame 1: top pair + bottom pair connected -->

  <!-- Spokes -->
  <line x1="22" y1="22" x2="22" y2="8" stroke="black" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="22" y1="22" x2="32" y2="12" stroke="black" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="22" y1="22" x2="36" y2="22" stroke="black" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="22" y1="22" x2="32" y2="32" stroke="black" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="22" y1="22" x2="22" y2="36" stroke="black" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="22" y1="22" x2="12" y2="32" stroke="black" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="22" y1="22" x2="8" y2="22" stroke="black" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="22" y1="22" x2="12" y2="12" stroke="black" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Active arcs: top + bottom pairs -->
  <line x1="22" y1="8" x2="32" y2="12" stroke="black" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="22" y1="36" x2="12" y2="32" stroke="black" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Center -->
  <circle cx="22" cy="22" r="3" fill="black"/>

  <!-- Outer nodes -->
  <circle cx="22" cy="8" r="2" fill="black"/>
  <circle cx="32" cy="12" r="2" fill="black"/>
  <circle cx="36" cy="22" r="2" fill="black"/>
  <circle cx="32" cy="32" r="2" fill="black"/>
  <circle cx="22" cy="36" r="2" fill="black"/>
  <circle cx="12" cy="32" r="2" fill="black"/>
  <circle cx="8" cy="22" r="2" fill="black"/>
  <circle cx="12" cy="12" r="2" fill="black"/>
</svg>
