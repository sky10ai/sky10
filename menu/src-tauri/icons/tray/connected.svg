<svg xmlns="http://www.w3.org/2000/svg" width="44" height="44" viewBox="0 0 44 44">
  <!-- Constellation: 5 stars connected by lines -->
  <!-- Template image: black on transparent, macOS inverts for dark mode -->

  <!-- Connection lines -->
  <line x1="10" y1="12" x2="22" y2="8" stroke="black" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="22" y1="8" x2="34" y2="14" stroke="black" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="22" y1="8" x2="18" y2="22" stroke="black" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="18" y1="22" x2="30" y2="28" stroke="black" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="18" y1="22" x2="12" y2="34" stroke="black" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Star nodes -->
  <circle cx="10" cy="12" r="2.5" fill="black"/>
  <circle cx="22" cy="8" r="3" fill="black"/>   <!-- primary node, slightly larger -->
  <circle cx="34" cy="14" r="2.5" fill="black"/>
  <circle cx="18" cy="22" r="2.5" fill="black"/>
  <circle cx="30" cy="28" r="2.5" fill="black"/>
  <circle cx="12" cy="34" r="2.5" fill="black"/>
</svg>
