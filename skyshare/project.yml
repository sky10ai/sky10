name: skyshare
options:
  bundleIdPrefix: ai.sky10
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"

targets:
  skyshare:
    type: application
    platform: macOS
    sources:
      - path: skyshare
        excludes:
          - Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.sky10.skyshare
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SWIFT_VERSION: "5.10"
        INFOPLIST_KEY_LSUIElement: true
    info:
      path: skyshare/Info.plist
      properties:
        CFBundleName: skyshare
        CFBundleDisplayName: Sky
        CFBundleIdentifier: ai.sky10.skyshare
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0.0"
        CFBundlePackageType: APPL
        CFBundleExecutable: skyshare
        LSMinimumSystemVersion: "14.0"
        LSUIElement: true

  skyshare-tests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: skyshare-tests
    dependencies:
      - target: skyshare
    settings:
      base:
        SWIFT_VERSION: "5.10"
