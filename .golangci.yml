version: "2"

# Start with the additional checks that already pass in this repo and add
# signal beyond gofmt/go vet. The broader golangci "standard" set currently
# reports an existing backlog that should be enabled deliberately later.
linters:
  default: none
  enable:
    - bodyclose
    - dupl
    - nolintlint
    - revive
    - rowserrcheck
    - sloglint
    - sqlclosecheck
  settings:
    dupl:
      threshold: 350
    revive:
      rules:
        - name: file-length-limit
          arguments:
            - max: 2500
              skip-comments: true
              skip-blank-lines: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

run:
  timeout: 10m
