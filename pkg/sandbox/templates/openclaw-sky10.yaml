minimumLimaVersion: 2.0.0

base:
- template:_images/ubuntu-24.04

vmType: vz

cpus: 4
memory: 8GiB
disk: 30GiB

networks:
- vzNAT: true

mounts:
- location: "__SKY10_SHARED_DIR__"
  mountPoint: "/shared"
  writable: true

provision:
- mode: system
  file:
    url: openclaw-sky10.system.sh
- mode: user
  file:
    url: openclaw-sky10.user.sh

probes:
- script: |
    #!/bin/bash
    set -eux -o pipefail
    command -v openclaw >/dev/null 2>&1
    timeout 120s bash -lc "until curl -fsS http://127.0.0.1:18789/health >/dev/null 2>&1 || ss -lnt | grep -q ':18789 '; do sleep 3; done"
  hint: See "/var/log/cloud-init-output.log" in the guest

message: |
  OpenClaw + sky10 is provisioning inside "__SKY10_SANDBOX_NAME__".

  Shared host directory:
    __SKY10_SHARED_DIR__

  The VM auto-installs:
  - sky10
  - OpenClaw
  - Chromium + Xvfb browser support
  - the sky10 OpenClaw channel plugin

  The guest sky10 daemon joins your existing sky10 network using the invite
  staged into the shared directory.

  OpenClaw then registers this VM as the "__SKY10_SANDBOX_NAME__" agent
  against the guest-local sky10 daemon on http://localhost:9101.

  Open the guest shell with:
    limactl shell __SKY10_SANDBOX_NAME__

  Open the OpenClaw UI by first checking the guest IP:
    limactl shell __SKY10_SANDBOX_NAME__ -- bash -lc "ip -4 route get 1.1.1.1"

  Then browse to:
    http://<guest-ip>:18790/chat?session=main

param:
  model: anthropic/claude-sonnet-4-6
