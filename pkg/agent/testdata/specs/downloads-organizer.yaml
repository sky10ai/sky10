    audience: private
    scope: current
    input_schema: {type: object, required: [folder], properties: {folder: {type: string}, destination: {type: string}}}
    output_schema: {type: object, required: [summary], properties: {summary: {type: string}, moved: {type: array}}}
    effects: [file.read, file.write, file.move]
    availability: {status: available}
    fulfillment: {mode: autonomous}
    pricing: {model: free}
    supports_cancel: true
    supports_streaming: false
inputs: [{kind: folder_ref, description: Downloads folder., required: true}]
outputs: [{kind: artifact, description: Organization summary., required: true}]
permissions: [file.read, file.write, file.move]
commerce: {enabled: false, default_pricing: {model: free}}
job_policy: {supports_cancel: true, supports_streaming: false, retention_days: 30}
publish_policy: {audience: private, scope: current}
