spec: 0.1.0
id: aspec_fixture_coding_codex_private
status: draft
prompt: create a coding agent with codex
name: codex-coding-agent
description: Use Codex as the agentic harness for repository analysis, code changes, tests, and pull request artifacts.
runtime:
  target: sandbox
  provider: lima
  template: codex-docker
  harness: codex
  packages: [git, nodejs, python3]
  containers:
    - {name: codex-worker, image: ghcr.io/sky10ai/sky10-agent-ubuntu:24.04, packages: [git, nodejs, python3]}
fulfillment: {mode: autonomous}
tools:
  - name: github.issue.fix
    capability: github.fix
    description: Analyze a repository task, modify code, run checks, and return branch or patch artifacts.
    audience: private
    scope: current
    input_schema: {type: object, required: [repo, task], properties: {repo: {type: string}, task: {type: string}, attachments: {type: array}}}
    output_schema: {type: object, required: [summary], properties: {summary: {type: string}, branch: {type: string}, pr_url: {type: string}, artifacts: {type: array}}}
    stream_schema: {type: object, properties: {message: {type: string}, progress: {type: number}}}
    effects: [repo.read, file.write, git.commit, test.run, network.http]
    availability: {status: available}
    fulfillment: {mode: autonomous}
    pricing: {model: free}
    supports_cancel: true
    supports_streaming: true
    meta: {harness: codex, services: [git, github], tags: [coding, automation]}
inputs:
  - {kind: repo_ref, description: Repository checkout or URI to work on., required: true}
  - kind: prompt
    description: Coding task, bug report, or issue description.
    required: true
outputs:
  - kind: artifact
    description: Patch, branch, commit, or pull request reference.
    required: true
secrets:
  - {name: github-token, env: GITHUB_TOKEN, required: false}
permissions: [repo.read, file.write, git.commit, test.run, network.http]
commerce: {enabled: false, default_pricing: {model: free}}
job_policy: {supports_cancel: true, supports_streaming: true, max_duration_seconds: 7200, retention_days: 30}
publish_policy: {audience: private, scope: current}
created_at: "2026-04-26T12:00:00Z"
updated_at: "2026-04-26T12:00:00Z"
meta: {spec_source: fixture}
