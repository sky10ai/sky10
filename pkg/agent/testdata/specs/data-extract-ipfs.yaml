spec: 0.1.0
id: aspec_fixture_data_extract_ipfs
status: draft
prompt: extract structured data from IPFS documents
name: ipfs-data-extraction-agent
description: Extract structured data from URI-backed documents including IPFS payload refs.
runtime: {target: sandbox, provider: lima, template: openclaw-docker, harness: openclaw}
fulfillment: {mode: autonomous}
tools:
  - name: data.extract
    capability: data.extract
    description: Extract fields from document payload refs and return JSON artifacts.
    audience: public
    scope: current
    input_schema: {type: object, required: [payload_ref, fields], properties: {payload_ref: {type: object}, fields: {type: array}}}
    output_schema: {type: object, required: [records], properties: {records: {type: array}, artifacts: {type: array}}}
    effects: [network.http, file.write]
    availability: {status: available}
    fulfillment: {mode: autonomous}
    pricing: {model: free}
    supports_cancel: true
    supports_streaming: true
inputs:
  - kind: payload_ref
    description: skyfs, ipfs, or https document URI.
    required: true
outputs: [{kind: artifact, description: JSON records and extraction summary., mime_types: [application/json], required: true}]
permissions: [network.http, file.write]
commerce: {enabled: false, default_pricing: {model: free}}
job_policy: {supports_cancel: true, supports_streaming: true, retention_days: 30}
publish_policy: {audience: public, scope: current}
created_at: "2026-04-26T12:00:00Z"
updated_at: "2026-04-26T12:00:00Z"
