spec: 0.1.0
id: aspec_fixture_image_generation_public
status: draft
prompt: sell an image generation agent for $1 per image
name: paid-image-generation-agent
description: Generate images from prompts with fixed per-image pricing.
runtime: {target: remote, provider: external, template: api-proxy, harness: api}
fulfillment: {mode: autonomous}
tools:
  - name: image.generate
    capability: image.generate
    description: Generate an image from a prompt.
    audience: public
    scope: explicit
    input_schema: {type: object, required: [prompt], properties: {prompt: {type: string}, style: {type: string}, size: {type: string}}}
    output_schema: {type: object, required: [artifacts], properties: {summary: {type: string}, artifacts: {type: array}}}
    effects: [network.http, file.write, payment.charge]
    availability: {status: available}
    fulfillment: {mode: autonomous}
    pricing:
      model: fixed
      amount: "1.00"
      payment_asset: {chain_id: "eip155:8453", symbol: USDC, decimals: 6}
    supports_cancel: true
    supports_streaming: false
inputs: [{kind: prompt, description: Image prompt., required: true}]
outputs: [{kind: artifact, description: Generated image., mime_types: [image/png, image/jpeg], required: true}]
secrets: [{name: image-provider-api-key, env: IMAGE_API_KEY, required: true}]
permissions: [network.http, file.write, payment.charge]
commerce: {enabled: true, default_pricing: {model: fixed, amount: "1.00", payment_asset: {chain_id: "eip155:8453", symbol: USDC, decimals: 6}}}
job_policy: {supports_cancel: true, supports_streaming: false, retention_days: 30}
publish_policy: {audience: public, scope: explicit}
created_at: "2026-04-26T12:00:00Z"
updated_at: "2026-04-26T12:00:00Z"
