spec: 0.1.0
id: aspec_fixture_meeting_summarizer
status: draft
prompt: summarize new meeting recordings and save action items
name: meeting-summary-agent
description: Summarize meeting recordings and extract action items.
runtime: {target: sandbox, provider: lima, template: openclaw-docker, harness: openclaw, packages: [ffmpeg]}
