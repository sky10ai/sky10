    audience: private
    scope: trusted
    input_schema: {type: object, required: [recording], properties: {recording: {type: object}, attendees: {type: array}}}
    output_schema: {type: object, required: [summary], properties: {summary: {type: string}, action_items: {type: array}}}
    effects: [file.read, file.write, calendar.read]
    availability: {status: available}
    fulfillment: {mode: autonomous}
    pricing: {model: free}
    supports_cancel: true
    supports_streaming: true
inputs: [{kind: payload_ref, description: Meeting audio or video recording., required: true}]
outputs: [{kind: artifact, description: Summary and action item report., required: true}]
permissions: [file.read, file.write, calendar.read]
commerce: {enabled: false, default_pricing: {model: free}}
job_policy: {supports_cancel: true, supports_streaming: true, retention_days: 14}
publish_policy: {audience: private, scope: trusted}
