spec: 0.1.0
id: aspec_fixture_email_triage_assisted
status: draft
prompt: review important email and draft replies for approval
name: email-triage-agent
description: Triage inbound email and draft replies while requiring human approval before sending.
runtime: {target: sandbox, provider: lima, template: openclaw-docker, harness: openclaw}
fulfillment: {mode: assisted, note: Human approval required before outbound send.}
tools:
  - name: email.triage
    capability: email.triage
    description: Review email threads and prepare reply drafts.
    audience: private
    scope: trusted
    input_schema: {type: object, required: [thread_ref], properties: {thread_ref: {type: string}, tone: {type: string}}}
    output_schema: {type: object, required: [summary], properties: {summary: {type: string}, drafts: {type: array}}}
    effects: [email.read, email.draft]
    availability: {status: available}
    fulfillment: {mode: assisted}
    pricing: {model: free}
    supports_cancel: true
    supports_streaming: true
inputs: [{kind: payload_ref, description: Email thread reference., required: true}]
outputs: [{kind: artifact, description: Reply drafts and triage summary., required: true}]
secrets: [{name: email-oauth-token, env: EMAIL_OAUTH_TOKEN, required: true}]
permissions: [email.read, email.draft]
commerce: {enabled: false, default_pricing: {model: free}}
job_policy: {supports_cancel: true, supports_streaming: true, retention_days: 14}
publish_policy: {audience: private, scope: trusted}
created_at: "2026-04-26T12:00:00Z"
updated_at: "2026-04-26T12:00:00Z"
