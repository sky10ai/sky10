name: verify-release

on:
  push:
    tags: ["v*"]

jobs:
  verify:
    name: Verify ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            runner: macos-latest
            asset: sky10-darwin-arm64
          - goos: darwin
            goarch: amd64
            runner: macos-latest
            asset: sky10-darwin-amd64
          - goos: linux
            goarch: arm64
            runner: ubuntu-latest
            asset: sky10-linux-arm64
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
            asset: sky10-linux-amd64
          - goos: windows
            goarch: arm64
            runner: ubuntu-latest
            asset: sky10-windows-arm64.exe
          - goos: windows
            goarch: amd64
            runner: ubuntu-latest
            asset: sky10-windows-amd64.exe
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: web/package.json

      - name: Build web frontend
        run: cd web && bun install --frozen-lockfile && bun run build

      - name: Build from source
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          COMMIT="$(git rev-parse --short=8 HEAD)"
          DATE="$(TZ=UTC git log -1 --format=%cd --date=format-local:%Y-%m-%dT%H:%M:%SZ)"
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -trimpath -buildvcs=false \
            -ldflags "-s -w -X 'main.version=v${VERSION}' -X 'main.commit=${COMMIT}' -X 'main.buildDate=${DATE}'" \
            -o sky10-rebuilt .
          shasum -a 256 sky10-rebuilt

      - name: Wait for release asset
        run: |
          for i in $(seq 1 30); do
            if gh release view "${GITHUB_REF_NAME}" --json assets -q '.assets[].name' 2>/dev/null | grep -Fq "${{ matrix.asset }}"; then
              echo "Release asset found"
              exit 0
            fi
            echo "Waiting for release asset... (attempt $i/30)"
            sleep 10
          done
          echo "::error::Release asset not found after 5 minutes"
          exit 1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download release asset
        run: |
          gh release download "${GITHUB_REF_NAME}" \
            --pattern "${{ matrix.asset }}" \
            --pattern "checksums.txt" \
            --dir release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify release checksum
        run: cd release && grep -F "${{ matrix.asset }}" checksums.txt | shasum -a 256 -c -

      - name: Compare binaries
        run: |
          HASH_REBUILT="$(shasum -a 256 sky10-rebuilt | awk '{print $1}')"
          HASH_RELEASE="$(shasum -a 256 release/${{ matrix.asset }} | awk '{print $1}')"
          echo "Rebuilt:  ${HASH_REBUILT}"
          echo "Release:  ${HASH_RELEASE}"
          if [ "${HASH_REBUILT}" != "${HASH_RELEASE}" ]; then
            echo "::error::Binary mismatch — release asset does not match source"
            ls -la sky10-rebuilt release/${{ matrix.asset }}
            exit 1
          fi
          echo "Reproducible build verified — binaries are byte-identical"
