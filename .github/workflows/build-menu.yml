name: build-menu

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.asset }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
            asset: sky10-menu-darwin-arm64
          - target: x86_64-apple-darwin
            runner: macos-latest
            asset: sky10-menu-darwin-amd64
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            asset: sky10-menu-linux-amd64
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            asset: sky10-menu-linux-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Build
        working-directory: menu/src-tauri
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        run: |
          cp menu/src-tauri/target/${{ matrix.target }}/release/sky10-menu ${{ matrix.asset }} 2>/dev/null || \
          cp menu/src-tauri/target/${{ matrix.target }}/release/sky10-menu.exe ${{ matrix.asset }} 2>/dev/null || \
          echo "Binary not found"
          chmod +x ${{ matrix.asset }} 2>/dev/null || true
          ls -la ${{ matrix.asset }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          gh release upload "${GITHUB_REF_NAME}" "${{ matrix.asset }}" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
