name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-go:
    name: Go tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - run: make check
      - run: make test-skyfs-cli

  test-integration:
    name: Integration tests (MinIO)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install MinIO
        run: |
          curl -sL https://dl.min.io/server/minio/release/linux-amd64/minio -o /usr/local/bin/minio
          chmod +x /usr/local/bin/minio

      - name: Run integration tests
        env:
          S3_ACCESS_KEY_ID: minioadmin
          S3_SECRET_ACCESS_KEY: minioadmin
        run: go test ./pkg/fs/ -tags integration -v -count=1

  test-swift:
    name: Swift tests (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - run: make test-skyfs-ui-macos
