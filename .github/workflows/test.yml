name: test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test-go:
    name: Go tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: web/package.json

      - name: Build web frontend
        run: cd web && bun install --frozen-lockfile && bun run build

      - run: make check
      - run: make test-skyfs-cli

  test-integration:
    name: Integration tests (MinIO)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: web/package.json

      - name: Build web frontend
        run: cd web && bun install --frozen-lockfile && bun run build

      - name: Install MinIO
        run: |
          curl -sL https://dl.min.io/server/minio/release/linux-amd64/minio -o /usr/local/bin/minio
          chmod +x /usr/local/bin/minio

      - name: Run integration tests
        env:
          S3_ACCESS_KEY_ID: minioadmin
          S3_SECRET_ACCESS_KEY: minioadmin
        run: go test ./pkg/fs/ -tags integration -v -count=1

      - name: Run multi-instance integration tests
        run: go test ./integration -tags integration -v -count=1
