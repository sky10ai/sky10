name: test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test-go:
    name: Go tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: web/package.json

      - name: Build web frontend
        run: cd web && bun install --frozen-lockfile && bun run build

      - name: Report Go test count
        shell: bash
        run: |
          count="$(go test ./... -list '^(Test|Example|Fuzz)' | awk '/^(Test|Example|Fuzz)/{c++} END{print c+0}')"
          echo "Discovered Go tests: ${count}"
          {
            echo "### Go Test Count"
            echo "- Discovered tests in \`./...\`: ${count}"
          } >> "$GITHUB_STEP_SUMMARY"

      - run: make check
      - run: make test-skyfs-cli

  test-integration:
    name: Integration tests (MinIO)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: web/package.json

      - name: Build web frontend
        run: cd web && bun install --frozen-lockfile && bun run build

      - name: Install MinIO
        run: |
          curl -sL https://dl.min.io/server/minio/release/linux-amd64/minio -o /usr/local/bin/minio
          chmod +x /usr/local/bin/minio

      - name: Report integration test counts
        shell: bash
        run: |
          fs_count="$(go test ./pkg/fs -tags integration -list '^(Test|Example|Fuzz)' | awk '/^(Test|Example|Fuzz)/{c++} END{print c+0}')"
          multi_count="$(go test ./integration -tags integration -list '^(Test|Example|Fuzz)' | awk '/^(Test|Example|Fuzz)/{c++} END{print c+0}')"
          echo "Discovered pkg/fs integration tests: ${fs_count}"
          echo "Discovered multi-instance integration tests: ${multi_count}"
          {
            echo "### Integration Test Counts"
            echo "- Discovered tests in \`./pkg/fs\` with \`-tags integration\`: ${fs_count}"
            echo "- Discovered tests in \`./integration\` with \`-tags integration\`: ${multi_count}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Run integration tests
        env:
          S3_ACCESS_KEY_ID: minioadmin
          S3_SECRET_ACCESS_KEY: minioadmin
        run: go test ./pkg/fs/ -tags integration -v -count=1

      - name: Run multi-instance integration tests
        run: go test ./integration -tags integration -v -count=1

  test-integration-skyfs-daemon:
    name: Integration tests (skyfs-daemon)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: web/package.json

      - name: Build web frontend
        run: cd web && bun install --frozen-lockfile && bun run build

      - name: Install MinIO
        run: |
          curl -sL https://dl.min.io/server/minio/release/linux-amd64/minio -o /usr/local/bin/minio
          chmod +x /usr/local/bin/minio

      - name: Report skyfs-daemon integration test count
        shell: bash
        run: |
          count="$(go test ./integration -tags integration,skyfs_daemon -list '^TestIntegration.*FS$' | awk '/^TestIntegration.*FS$/{c++} END{print c+0}')"
          echo "Discovered skyfs-daemon integration tests: ${count}"
          {
            echo "### skyfs-daemon Integration Test Count"
            echo "- Discovered tests in \`./integration\` with \`-tags integration,skyfs_daemon\`: ${count}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Run skyfs daemon integration tests
        env:
          S3_ACCESS_KEY_ID: minioadmin
          S3_SECRET_ACCESS_KEY: minioadmin
        run: make test-skyfs-daemon-integration
