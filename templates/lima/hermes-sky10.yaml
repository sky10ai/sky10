minimumLimaVersion: 2.0.0

base:
- template:_images/ubuntu-24.04

vmType: vz

cpus: 4
memory: 8GiB
disk: 30GiB

networks:
- lima: user-v2

portForwards:
- guestIP: "127.0.0.1"
  guestPort: 9101
  hostIP: "127.0.0.1"
  hostPort: __SKY10_GUEST_FORWARD_PORT__
  proto: tcp
- guestIP: "127.0.0.1"
  guestPortRange: [1, 65535]
  proto: any
  ignore: true
- guestIP: "0.0.0.0"
  guestPortRange: [1, 65535]
  proto: any
  ignore: true

mounts:
- location: "__SKY10_SHARED_DIR__"
  mountPoint: "/shared"
  writable: true
- location: "__SKY10_STATE_DIR__"
  mountPoint: "/sandbox-state"
  writable: true

provision:
- mode: dependency
  file:
    url: hermes-sky10.dependency.sh
- mode: system
  file:
    url: hermes-sky10.system.sh
- mode: user
  file:
    url: hermes-sky10.user.sh

probes:
- script: |
    #!/bin/bash
    set -eux -o pipefail
    timeout 180s bash -lc 'export PATH="$HOME/.local/bin:$HOME/.cargo/bin:$PATH"; until command -v hermes >/dev/null 2>&1; do sleep 3; done'
  hint: See "/var/log/cloud-init-output.log" in the guest

message: |
  Hermes is provisioning inside "__SKY10_SANDBOX_NAME__".

  Agent home:
    __SKY10_SHARED_DIR__

  Sandbox state:
    __SKY10_STATE_DIR__

  The VM auto-installs:
  - Hermes Agent
  - a sandbox-local `/sandbox-state/.env` for provider keys
  - the `hermes-shared` helper for launching Hermes in the shared workspace

  Open the guest shell with:
    limactl shell __SKY10_SANDBOX_NAME__

  Host-forwarded guest sky10:
    http://127.0.0.1:__SKY10_GUEST_FORWARD_PORT__

  Start Hermes directly from your host with:
    limactl shell __SKY10_SANDBOX_NAME__ -- bash -lc 'hermes-shared'

param:
  model: anthropic/claude-opus-4-6
