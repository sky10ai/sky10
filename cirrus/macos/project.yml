name: Cirrus
options:
  bundleIdPrefix: ai.sky10
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"

targets:
  Cirrus:
    type: application
    platform: macOS
    sources:
      - path: cirrus
        excludes:
          - Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.sky10.cirrus
        PRODUCT_NAME: Cirrus
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SWIFT_VERSION: "5.10"
        INFOPLIST_KEY_LSUIElement: true
    info:
      path: cirrus/Info.plist
      properties:
        CFBundleName: Cirrus
        CFBundleDisplayName: Cirrus
        CFBundleIdentifier: ai.sky10.cirrus
        CFBundleVersion: "1"
        CFBundleShortVersionString: "0.1.0"
        CFBundlePackageType: APPL
        CFBundleExecutable: Cirrus
        LSMinimumSystemVersion: "14.0"
        LSUIElement: true

  Cirrus-Tests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: cirrus-tests
    dependencies:
      - target: Cirrus
    settings:
      base:
        SWIFT_VERSION: "5.10"
